# .nightshift.yml — reference config (copy to target repo root)
#
# Each target repo gets its own .nightshift.yml defining which skills
# to run and how. DB is stored at $REPO/.nightshift/nightshift.db (auto-created).
#
# Scanning, filtering, and priority logic live in BacklogSources (Ruby classes),
# NOT in this config. This file defines runtime properties only.

# Backends define execution profiles: harness binary + concurrency.
# Skills reference a backend by name. Concurrency is enforced per harness —
# e.g. a local model server handles 1 request at a time while a frontier API
# can handle 4 concurrent skill runs.
backends:
  local:
    harness: claude-ds4     # binary name
    concurrency: 1          # max concurrent running items across all skills using this backend
  frontier:
    harness: claude
    concurrency: 4

# Which backend to use when a skill doesn't specify one.
default_backend: local

skills:
  haml-migration:
    needs_server: true      # launch overmind (Procfile.sidekiq.dev) before skill
    port: 3210              # port for the dev server in this worktree
    # backend: frontier     # override to use frontier for this skill

  test-optimization: {}     # no special config needed

  i18n-hardcoded:
    needs_server: true
    port: 3220
    batch_size: 5           # process N items per worktree (claim_batch)

  n1-query-fix: {}

  flaky-test-fix: {}

  reprioritize:
    meta: true              # not a real skill — excluded from pick_next_items
