# .nightshift.yml — runtime config (copy to target repo root)
#
# Skills are auto-discovered from BacklogSources::REGISTRY.
# This file only declares runtime overrides (port, server, batch_size, backend).
# Skills without overrides don't need an entry here.

# Backends define execution profiles: harness binary + concurrency.
# Skills reference a backend by name. Concurrency is enforced per harness —
# e.g. a local model server handles 1 request at a time while a frontier API
# can handle 4 concurrent skill runs.
backends:
  local:
    harness: claude-ds4
    concurrency: 1
  frontier:
    harness: claude
    concurrency: 4

# Which backend to use when a skill doesn't specify one.
default_backend: local

# Only skills needing runtime overrides are listed here.
# Skills without config (test-optimization, n1-query-fix, flaky-test-fix)
# are discovered automatically via BacklogSources::REGISTRY.
skills:
  haml-migration:
    needs_server: true
    port: 3210
    vite_port: 3211

  i18n-hardcoded:
    needs_server: true
    port: 3220
    vite_port: 3221
    batch_size: 5
